<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Block Smash | Vedrix Labs</title>
    <meta name="description" content="Download Block Smash - a frosty crystal puzzle game. Free on Android and iOS.">
    <link rel="icon" type="image/png" href="../assets/app_icon.png">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a1628;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .message { opacity: 0.7; font-size: 1.1rem; }
        a { color: #5AAADC; }
    </style>
</head>
<body>
    <div>
        <p class="message">Redirecting to your app store...</p>
        <p style="margin-top: 1rem; opacity: 0.5; font-size: 0.9rem;">
            Not redirected? Download on
            <a href="https://play.google.com/store/apps/details?id=com.vedrixlabs.blockblastfrozen">Google Play</a> or
            <a href="https://apps.apple.com/app/com.vedrixlabs.blockblastfrozen">App Store</a>
        </p>
    </div>
    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var utmSource = params.get('utm_source') || '';
            var utmMedium = params.get('utm_medium') || '';
            var utmCampaign = params.get('utm_campaign') || '';
            var utmContent = params.get('utm_content') || '';

            var playUrl = 'https://play.google.com/store/apps/details?id=com.vedrixlabs.blockblastfrozen';
            var appleUrl = 'https://apps.apple.com/app/com.vedrixlabs.blockblastfrozen';

            // Build Play Store referrer string from UTM params
            var referrerParts = [];
            if (utmSource) referrerParts.push('utm_source=' + utmSource);
            if (utmMedium) referrerParts.push('utm_medium=' + utmMedium);
            if (utmCampaign) referrerParts.push('utm_campaign=' + utmCampaign);
            if (utmContent) referrerParts.push('utm_content=' + utmContent);

            if (referrerParts.length > 0) {
                playUrl += '&referrer=' + encodeURIComponent(referrerParts.join('&'));
            }

            // Build App Store campaign token from utm_source
            if (utmSource) {
                appleUrl += '?ct=' + encodeURIComponent(utmSource) + '&mt=8';
            }

            // Update fallback links
            var links = document.querySelectorAll('a');
            links[0].href = playUrl;
            links[1].href = appleUrl;

            // Detect platform and redirect
            var ua = navigator.userAgent || navigator.vendor;
            if (/android/i.test(ua)) {
                window.location.href = playUrl;
            } else if (/iPad|iPhone|iPod/.test(ua)) {
                window.location.href = appleUrl;
            } else {
                // Desktop — redirect to homepage download section
                window.location.href = '../' + (window.location.search || '');
            }
        })();
    </script>
</body>
</html>
